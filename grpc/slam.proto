syntax = "proto3";

package sensors;

import "lidar.proto";

message Empty {
}

message Pose3D {
	double x = 1;
	double y = 2;
	double z = 3;
	double phi = 4;
	double omega = 5;
	double theta = 6;
}

service SlamService {
	rpc GetMap(Empty) returns (PointCloud3);
	rpc GetMapIncrements(Empty) returns (stream PointCloud3);
	rpc GetTransformedScan(Empty) returns (stream PointCloud3);
	rpc GetCorrespondences(Empty) returns (stream PointCloud3);
	rpc GetPose(Empty) returns (stream Pose3D);
	rpc Stop(Empty) returns (Empty);
	rpc Start(Empty) returns (Empty);
	rpc Reset(Empty) returns (Empty);
}



